services:
  app:
    image: oven/bun:latest
    working_dir: /app
    volumes:
      # Mount the project from the host, including node_modules installed with Bun
      - .:/app
    environment:
      # These are exposed to Vite as import.meta.env.VITE_*
      # SurrealDB WebSocket endpoint including /rpc path
      VITE_DB_WEBDOCKET: "ws://localhost:8001/rpc"
      # Printer service base URL (host -> printer container)
      VITE_PRINT_SERVER_URL: "http://localhost:3132"
      # Payment service base URL (host -> payment container)
      VITE_PAYMENT_SERVER_URL: "${VITE_PAYMENT_SERVER_URL:-http://localhost:3134}"
    # Dev mode with Bun + Vite, binding to all interfaces.
    # Assumes you've already run `bun install` on the host.
    command: sh -c "bun run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - surrealdb
      - printer
      - payment

  surrealdb:
    image: surrealdb/surrealdb:v2.6.2
    # Same as: surreal start -u root -p root surrealkv://database --bind 0.0.0.0:8001
    working_dir: /
    user: "0:0"
    command: >
      start --user root --pass root surrealkv://database --bind 0.0.0.0:8001
    ports:
      - "8001:8001"
    volumes:
      # Host /database -> container /database (surrealkv://database resolves to ./database = /database)
      - ./database:/database

  printer:
    build:
      context: ./printing
      dockerfile: Dockerfile
    image: posr-react-printer:latest
    working_dir: /app
    volumes:
      - ./printing:/app
      - printer-node_modules:/app/node_modules
    environment:
      - PRINT_PORT=3132
      - PRINT_HOST=0.0.0.0
    command: sh -c "npm install && node server.js"
    ports:
      - "3132:3132"
    # USB access for local USB printers
    devices:
      - /dev/bus/usb:/dev/bus/usb

  payment:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./payments:/app
      - payment-node_modules:/app/node_modules
    environment:
      - PAYMENT_PORT=3134
      - PAYMENT_HOST=0.0.0.0
      - PAYMENT_BASE_URL=${VITE_PAYMENT_SERVER_URL:-http://localhost:3134}
    command: sh -c "npm install && node server.js"
    ports:
      - "3134:3134"

volumes:
  printer-node_modules:
  payment-node_modules:

